# Defines the app-level permission for the request_mic_permission Tauri command.
#
# Without this file, tauri_build::build() has no knowledge of app commands
# (AppManifest::commands defaults to empty), so the capability reference to
# "allow-request-mic-permission" in capabilities/psycheros-daemon.json fails
# validation at build time.

[[permission]]
identifier = "allow-request-mic-permission"
description = "Enables the request_mic_permission command without any pre-configured scope."
commands.allow = ["request_mic_permission"]
